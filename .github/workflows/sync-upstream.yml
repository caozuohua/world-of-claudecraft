name: Audit Upstream Drift

on:
  schedule:
    - cron: "0 4 * * 1"  # Every Monday at 04:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/levy-street/world-of-claudecraft.git || true

      - name: Fetch upstream
        run: |
          git fetch upstream --tags

      - name: Build drift report
        id: drift
        shell: bash
        run: |
          read -r AHEAD BEHIND < <(git rev-list --left-right --count HEAD...upstream/main)
          if git merge-base --is-ancestor HEAD upstream/main; then
            STATE="fork can be fast-forwarded, but no merge was attempted"
          elif git merge-base --is-ancestor upstream/main HEAD; then
            STATE="fork already contains upstream/main"
          else
            STATE="branches have diverged; manual review is required"
          fi

          cat > upstream-sync-report.md <<EOF
          # Upstream drift report

          - Generated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          - Fork commit: $(git rev-parse HEAD)
          - Upstream commit: $(git rev-parse upstream/main)
          - Commits behind upstream: ${BEHIND}
          - Commits ahead of upstream: ${AHEAD}
          - State: ${STATE}

          This workflow is audit-only. It does not merge, create branches, push commits, or push tags.
          Review: https://github.com/caozuohua/world-of-claudecraft/compare/main...levy-street:world-of-claudecraft:main
          EOF
          cat upstream-sync-report.md >> "$GITHUB_STEP_SUMMARY"
          echo "behind=${BEHIND}" >> "$GITHUB_OUTPUT"
          echo "ahead=${AHEAD}" >> "$GITHUB_OUTPUT"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: upstream-drift-report
          path: upstream-sync-report.md
          retention-days: 30

      - name: Flag manual review
        if: steps.drift.outputs.behind != '0'
        run: echo "::warning::Fork is ${{ steps.drift.outputs.behind }} commits behind upstream. Review the report before any manual sync."
